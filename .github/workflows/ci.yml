name: CI

# master'a her push ve PR'da çalışır.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Monolith ve servisler net8.0, test projesi net10.0 — ikisi de kurulmalı.
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # NuGet paketlerini cache'le: csproj değişmediği sürece tekrar indirilmez.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore TourConnect.sln

      - name: Build
        run: dotnet build TourConnect.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test TourConnect.sln --no-build --configuration Release --verbosity normal
